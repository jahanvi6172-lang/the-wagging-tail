<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Adoption Form</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5e6d3; /* beige */
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #fff3e0;
        padding: 30px;
        border-radius: 15px;
        width: 360px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        animation: fadeIn 1s ease;
    }

    h2 {
        text-align: center;
        color: #e65100;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        color: #bf360c;
        display: block;
        margin-top: 10px;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ffcc80;
        outline: none;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #ff6f00;
        box-shadow: 0 0 5px #ffb74d;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        border: none;
        border-radius: 10px;
        background: #ff6f00;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e65100;
        transform: scale(1.05);
    }

    /* Success Page */
    .success {
        display: none;
        text-align: center;
        color: #2e7d32;
        font-size: 20px;
        font-weight: bold;
        animation: pop 0.6s ease;
    }

    /* Show success when #success is targeted */
    #success:target {
        display: block;
    }

    /* Hide form when success is shown */
    #success:target ~ .container {
        display: none;
    }

    /* Animations */
    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    @keyframes pop {
        from {opacity: 0; transform: scale(0.8);}
        to {opacity: 1; transform: scale(1);}
    }
    svg{
        height: 30px;
        width: 30px;
        fill: rgb(131, 51, 51);
    }
</style>
</head>

<body>

<!-- SUCCESS MESSAGE -->
<div id="success" class="success">
    <p> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M298.5 156.9C312.8 199.8 298.2 243.1 265.9 253.7C233.6 264.3 195.8 238.1 181.5 195.2C167.2 152.3 181.8 109 214.1 98.4C246.4 87.8 284.2 114 298.5 156.9zM164.4 262.6C183.3 295 178.7 332.7 154.2 346.7C129.7 360.7 94.5 345.8 75.7 313.4C56.9 281 61.4 243.3 85.9 229.3C110.4 215.3 145.6 230.2 164.4 262.6zM133.2 465.2C185.6 323.9 278.7 288 320 288C361.3 288 454.4 323.9 506.8 465.2C510.4 474.9 512 485.3 512 495.7L512 497.3C512 523.1 491.1 544 465.3 544C453.8 544 442.4 542.6 431.3 539.8L343.3 517.8C328 514 312 514 296.7 517.8L208.7 539.8C197.6 542.6 186.2 544 174.7 544C148.9 544 128 523.1 128 497.3L128 495.7C128 485.3 129.6 474.9 133.2 465.2zM485.8 346.7C461.3 332.7 456.7 295 475.6 262.6C494.5 230.2 529.6 215.3 554.1 229.3C578.6 243.3 583.2 281 564.3 313.4C545.4 345.8 510.3 360.7 485.8 346.7zM374.1 253.7C341.8 243.1 327.2 199.8 341.5 156.9C355.8 114 393.6 87.8 425.9 98.4C458.2 109 472.8 152.3 458.5 195.2C444.2 238.1 406.4 264.3 374.1 253.7z"/></svg><br>We will reach you within 24 hours!</p>
</div>

<!-- FORM -->
<div class="container">
    <h2>Dog Adoption Form</h2>

    <form method="get" action="#success">
        
        <label>Full Name</label>
        <input type="text" name="name" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Phone</label>
        <input type="tel" name="phone" required>

        <label>Dog Gender</label>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Dog Age (in months)</label>
        <input type="number" name="age" min="0" max="75">

        <label>Date of Birth</label>
        <input type="date" name="dob">

        <label>Breed</label>
        <input type="text" name="breed" placeholder="e.g. Labrador, Indie">

        <label>Why do you want to adopt?</label>
        <textarea name="reason" rows="3"></textarea>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
